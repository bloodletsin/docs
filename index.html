<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bleh Docs</title>
  <link rel="icon" href="https://bleh.rest/favicon.ico">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.css">
</head>
<body>
  <div id="app"></div>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script>
    window.$docsify = {
      name: 'Bleh Docs',
      repo: 'bloodletsin/bleh-docs',
      loadSidebar: '_sidebar.md',
      auto2top: true,
      maxLevel: 3,
      subMaxLevel: 2,
      search: 'auto',
      copyCode: { buttonText: 'Copy' }
    }
  </script>
</body>
</html>
